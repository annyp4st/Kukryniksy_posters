      color: #f2e5d0;

      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

      top: -15px;
      right: -15px;
      width: 40px;
      height: 40px;
      background: #9e2b2b;
      color: white;
      font-size: 30px;
      font-weight: bold;

      align-items: center;
      justify-content: center;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #f2e5d0;
      box-shadow: 0 2px 10px black;
      transition: 0.2s;

      background: #4a2c1a;

      <div id="grid" class="grid" aria-live="polite"></div>
      <div class="row" style="justify-content: center; margin-top: 12px">

          { title: "Удар в сердце.", author: "Кукрыниксы", file: "54.jpg" },
          { title: "Конец игры", author: "Кукрыниксы", file: "55.jpg" },
          { title: "Весна 1945 года", author: "Кукрыниксы", file: "56.jpg" },
          { title: "Поверженный Берлин 1945", author: "Кукрыниксы", file: "57.jpg" },
          { title: "Карта шита-крыта, но будет бита все равно.", author: "Кукрыниксы", file: "58.jpg" },
          { title: "Трюк с бомбой этим циркачам, как видно, снится по ночам.", author: "Кукрыниксы", file: "59.jpg" },
        ],
      },
    ];

    window.NLRS_FILES = [];
  </script>

  <script>
    (function() {
      const BASE = "./assets/posters_by_year/";
      const BASE_SMALL = "./assets/posters_by_year_small/";

      const yearSelect = document.getElementById("yearSelect");
      const qEl = document.getElementById("q");
      const resetBtn = document.getElementById("resetBtn");
      const addPosterBtn = document.getElementById("addPosterBtn");
      const gridEl = document.getElementById("grid");
      const counterEl = document.getElementById("counter");
      const showMoreBtn = document.getElementById("showMoreBtn");
      const tulaFilter = document.getElementById("tula-museum-filter");
      const totalCounterSpan = document.getElementById("total-counter");

      // Lightbox elements
      const lightbox = document.getElementById("lightbox");
      const lightboxImg = lightbox.querySelector(".lightbox-img");
      const lightboxCaption = lightbox.querySelector(".lightbox-caption");
      const lightboxClose = lightbox.querySelector(".lightbox-close");

      // Закрытие лайтбокса
      function closeLightbox() {
        lightbox.style.display = "none";
        lightboxImg.src = "";
      }
      lightboxClose.addEventListener("click", closeLightbox);
      lightbox.addEventListener("click", (e) => {
        if (e.target === lightbox) closeLightbox();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeLightbox();
      });

      const LS_USER_KEY = "userPosters_v1";
      const PAGE_SIZE = 24;
      let visibleLimit = PAGE_SIZE;

      function loadUserPosters() {
        try {
          const raw = localStorage.getItem(LS_USER_KEY);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch { return []; }
      }
      let USER_POSTERS = loadUserPosters();

      function saveUserPosters(list) {
        try { localStorage.setItem(LS_USER_KEY, JSON.stringify(list)); } catch {}
      }

      function flatten() {
        const rows = [];
        for (const block of window.EXHIBIT_DATA || []) {
          for (const it of block.items || []) {
            rows.push({
              year: block.year,
              title: it.title,
              author: it.author || "",
              file: it.file,
              museum: it.museum,
              user: false,
            });
          }
        }
        for (const it of USER_POSTERS || []) {
          rows.push({
            year: it.year,
            title: it.title,
            author: it.author || "",
            file: it.file,
            museum: it.museum,
            user: true,
          });
        }
        return rows;
      }
      let ALL = flatten();

      function normalizeForSearch(s) {
        return String(s ?? "").toLowerCase().replace(/ё/g, "е").replace(/[«»"']/g, "").replace(/\s+/g, " ").trim();
      }

      function matches(row, yearValue, q, tulaOnly) {
        if (yearValue !== "all" && String(row.year) !== String(yearValue)) return false;
        if (tulaOnly && !row.museum) return false;
        if (!q) return true;
        const qq = normalizeForSearch(q);
        if (!qq) return true;
        const hay = normalizeForSearch(`${row.title} ${row.author} ${row.year} ${row.museum || ""}`);
        return hay.includes(qq);
      }

      function candidatesExisting(row) {
        const explicit = String(row?.file ?? "").trim();
        if (explicit) return [explicit];
        return [];
      }

      function render() {
        const yearValue = yearSelect?.value ?? "all";
        const q = qEl?.value ?? "";
        const tulaOnly = tulaFilter?.checked ?? false;

        const filtered = ALL.filter(r => matches(r, yearValue, q, tulaOnly)).filter(r => candidatesExisting(r).length > 0);
        const visible = filtered.slice(0, Math.max(0, visibleLimit));

        let shown = 0;
        if (counterEl) {
          const yearLabel = yearValue === "all" ? "все годы" : `год ${yearValue}`;
          const tulaLabel = tulaOnly ? " (только музеи Тулы)" : "";
          counterEl.textContent = `Показано: ${Math.min(filtered.length, visible.length)} из ${filtered.length} (${yearLabel}${tulaLabel})`;
        }

        // Обновим общий счётчик в футере
        if (totalCounterSpan) totalCounterSpan.textContent = ALL.length;

        gridEl.innerHTML = "";
        for (const row of visible) {
          const candidates = candidatesExisting(row);
          if (!candidates.length) continue;

          const card = document.createElement("div");
          card.className = "item";

          const imgWrap = document.createElement("div");
          imgWrap.className = "imgWrap";
          const img = document.createElement("img");
          img.alt = `«${row.title}» (${row.year})`;
          img.loading = "lazy";

          let tryIdx = 0;
          let phase = 0; // 0 - малый, 1 - большой
          const setSrc = () => {
            const file = candidates[tryIdx];
            img.src = (phase === 0 ? BASE_SMALL : BASE) + file;
          };
          setSrc();

          img.onerror = () => {
            if (phase === 0) {
              phase = 1;
              setSrc();
              return;
            }
            phase = 0;
            tryIdx += 1;
            if (tryIdx < candidates.length) {
              setSrc();
              return;
            }
            card.remove();
            shown--;
            if (counterEl) {
              const yearLabel = yearValue === "all" ? "все годы" : `год ${yearValue}`;
              const tulaLabel = tulaOnly ? " (только музеи Тулы)" : "";
              counterEl.textContent = `Показано: ${shown} из ${filtered.length} (${yearLabel}${tulaLabel})`;
            }
          };

          imgWrap.appendChild(img);
          card.appendChild(imgWrap);

          const meta = document.createElement("div");
          meta.className = "meta";
          meta.appendChild(Object.assign(document.createElement("div"), { className: "title", textContent: `«${row.title}»` }));
          meta.appendChild(Object.assign(document.createElement("div"), { className: "author", textContent: `${row.author} - ${row.year}` }));
          if (row.museum) {
            meta.appendChild(Object.assign(document.createElement("div"), { className: "museum", textContent: `Музей: ${row.museum}` }));
          }
          if (row.user) {
            const actions = document.createElement("div");
            actions.className = "row";
            actions.style.marginTop = "10px";
            const delBtn = document.createElement("button");
            delBtn.type = "button";
            delBtn.className = "btn btnGhost btnSmall btnDanger";
            delBtn.textContent = "Удалить";
            delBtn.addEventListener("click", (e) => {
              e.stopPropagation(); // не открывать лайтбокс
              USER_POSTERS = USER_POSTERS.filter(p =>
                String(p.year) !== String(row.year) ||
                normalizeForSearch(p.title) !== normalizeForSearch(row.title) ||
                String(p.file) !== String(row.file)
              );
              saveUserPosters(USER_POSTERS);
              ALL = flatten();
              render();
            });
            actions.appendChild(delBtn);
            meta.appendChild(actions);
          }
          card.appendChild(meta);

          // Клик по карточке открывает лайтбокс
          card.addEventListener("click", (e) => {
            // игнорируем клик по кнопке удаления
            if (e.target.closest(".btnDanger")) return;
            // Показываем большое изображение
            const bigFile = candidates[0]; // используем первый кандидат (явный file)
            lightboxImg.src = BASE + bigFile;
            lightboxCaption.innerHTML = `«${row.title}»<br>${row.author} • ${row.year}`;
            lightbox.style.display = "flex";
          });

          gridEl.appendChild(card);
          shown++;
        }

        if (counterEl) {
          const yearLabel = yearValue === "all" ? "все годы" : `год ${yearValue}`;
          const tulaLabel = tulaOnly ? " (только музеи Тулы)" : "";
          counterEl.textContent = `Показано: ${shown} из ${filtered.length} (${yearLabel}${tulaLabel})`;
        }

        if (showMoreBtn) {
          const remaining = Math.max(0, filtered.length - Math.min(filtered.length, visibleLimit));
          if (remaining <= 0) showMoreBtn.style.display = "none";
          else {
            showMoreBtn.style.display = "";
            showMoreBtn.textContent = `Показать ещё (${Math.min(PAGE_SIZE, remaining)} из ${remaining})`;
          }
        }
      }

      function resetControls() {
        if (yearSelect) yearSelect.value = "all";
        if (qEl) qEl.value = "";
        if (tulaFilter) tulaFilter.checked = false;
        visibleLimit = PAGE_SIZE;
        render();
      }

      function addPosterFlow() {
        const y = prompt("Год (например 1941):", "1941");
        if (y == null) return;
        const year = Number(String(y).trim());
        if (!Number.isFinite(year)) return;

        const title = prompt("Название плаката (обязательно):", "");
        if (title == null) return;
        const t = String(title).trim();
        if (!t) return;

        const author = prompt("Автор (можно оставить пустым):", "");
        const a = String(author).trim() || "-";

        const file = prompt("Имя файла (например 60.jpg):", "");
        if (file == null) return;
        const f = String(file).trim();
        if (!f) return;

        const museum = prompt("Название музея (если есть):", "");

        USER_POSTERS = [...USER_POSTERS, { year, title: t, author: a, file: f, museum: museum ? museum.trim() : undefined }];
        saveUserPosters(USER_POSTERS);
        ALL = flatten();
        visibleLimit = Math.max(visibleLimit, PAGE_SIZE);
        render();
      }

      function resetPaging() { visibleLimit = PAGE_SIZE; }

      yearSelect?.addEventListener("change", () => { resetPaging(); render(); });
      qEl?.addEventListener("input", () => { resetPaging(); render(); });
      resetBtn?.addEventListener("click", resetControls);
      addPosterBtn?.addEventListener("click", addPosterFlow);
      tulaFilter?.addEventListener("change", () => { resetPaging(); render(); });
      showMoreBtn?.addEventListener("click", () => { visibleLimit += PAGE_SIZE; render(); });

      render();
    })();
  </script>
</body>
</html>
